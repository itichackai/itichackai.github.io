<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOVERNMENT ITI CHACKAI - EXAMS</title>

    <!-- WhatsApp and Social Media Link Preview Metadata -->
    <meta property="og:title" content="GOVERNMENT ITI CHACKAI - EXAMS" />
    <meta property="og:description" content="Official Examination Portal. Select your model exam below." />
    <meta property="og:url" content="https://itichackai.github.io/" />
    <meta property="og:type" content="website" />

    <!-- Google Material Icons for the portal buttons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .portal-container {
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            text-align: center;
        }
        .header-box {
            background-color: #1b5e20; /* Deep green matching ITI themes */
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        .header-box h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }
        .header-box p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .exam-card {
            background-color: #ffffff;
            color: #333333;
            text-decoration: none;
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #e0e0e0;
        }
        .exam-card:active, .exam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border-color: #1b5e20;
        }
        .icon-box {
            background-color: #e8f5e9;
            color: #1b5e20;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
        }
        .icon-box .material-icons {
            font-size: 28px;
        }
        .text-box {
            text-align: left;
        }
        .text-box h2 {
            margin: 0;
            font-size: 18px;
            color: #1b5e20;
        }
        .text-box p {
            margin: 4px 0 0 0;
            font-size: 13px;
            color: #666666;
        }
        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        
        <div class="header-box">
            <h1>GOVERNMENT ITI CHACKAI</h1>
            <p>Online Examination Portal</p>
        </div>

        <div class="buttons-grid">
            
            <!-- Link Card for Exam 1 -->
            <a href="https://itichackai.github.io/modelexam1" class="exam-card">
                <div class="icon-box">
                    <span class="material-icons">assignment</span>
                </div>
                <div class="text-box">
                    <h2>Model Examination 1</h2>
                    <p>Click here to start Test Paper 1</p>
                </div>
            </a>

            <!-- Link Card for Exam 2 -->
            <a href="https://itichackai.github.io/modelexam2" class="exam-card">
                <div class="icon-box">
                    <span class="material-icons">assignment_turned_in</span>
                </div>
                <div class="text-box">
                    <h2>Model Examination 2</h2>
                    <p>Click here to start Test Paper 2</p>
                </div>
            </a>

        </div>

        <p class="footer-text">© 2026 Government ITI Chackai. All Rights Reserved.</p>
    </div>

</body>
</html>
