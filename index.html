<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GOVERNMENT ITI CHACKAI - EXAMS</title>

    <!-- WhatsApp Preview Metadata -->
    <meta property="og:title" content="GOVERNMENT ITI CHACKAI - EXAMS" />
    <meta property="og:description" content="Official Examination Portal. Select your model exam below." />
    <meta property="og:url" content="https://itichackai.github.io/" />
    <meta property="og:type" content="website" />

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column; /* Stacks header above the container */
            min-height: 100vh;
        }

        /* --- Full-Width Green Header --- */
        .full-width-header {
            width: 100%;
            background-color: #1b5e20; /* Deep green */
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 10;
        }
        .full-width-header h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .full-width-header p {
            margin: 8px 0 0 0;
            font-size: 24px;
            opacity: 0.9;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Center Container for Buttons --- */
        .main-content {
            flex-grow: 1; /* Pushes footer down */
            display: flex;
            justify-content: center;
            align-items: center; /* Vertically center buttons between header and footer */
            padding: 40px 20px;
        }
        .portal-container {
            width: 100%;
            max-width: 480px;
        }
        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .exam-card {
            background-color: #ffffff;
            color: #333333;
            text-decoration: none;
            padding: 22px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 2px solid transparent;
        }
        .exam-card:active {
            transform: translateY(1px);
        }
        .exam-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            border-color: #1b5e20;
        }
        .icon-box {
            background-color: #e8f5e9;
            color: #1b5e20;
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            flex-shrink: 0; /* Prevents icon from shrinking on narrow screens */
        }
        .icon-box .material-icons {
            font-size: 30px;
        }
        .text-box {
            text-align: left;
        }
        .text-box h2 {
            margin: 0;
            font-size: 19px;
            color: #1b5e20;
            font-weight: 600;
        }
        .text-box p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #666666;
            line-height: 1.4;
        }
        .footer-text {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #999999;
        }
    </style>
</head>
<body>

    <!-- Full-Width Green Header spanning edge-to-edge -->
    <header class="full-width-header">
        <h1>GOVERNMENT ITI CHACKAI</h1>
        <p>MODEL EXAM PORTAL</p>
    </header>

    <!-- Main area for centered buttons -->
    <main class="main-content">
        <div class="portal-container">
            <div class="buttons-grid">
                
                <!-- Link Card for Exam 1 -->
                <a href="https://itichackai.github.io/modelexam1" class="exam-card">
                    <div class="icon-box">
                        <span class="material-icons">assignment</span>
                    </div>
                    <div class="text-box">
                        <h2>Model Exam 1</h2>
                        <p>Click here to start Model Exam 1</p>
                    </div>
                </a>

                <!-- Link Card for Exam 2 -->
                <a href="https://itichackai.github.io/modelexam2" class="exam-card">
                    <div class="icon-box">
                        <span class="material-icons">assignment</span>
                    </div>
                    <div class="text-box">
                        <h2>Model Exam 2</h2>
                        <p>Click here to start Model Exam 2</p>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <footer class="footer-text">
        © 2026 Government ITI Chackai. All Rights Reserved.
    </footer>

</body>
</html>
